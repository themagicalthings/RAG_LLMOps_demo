services:
  backend:
    container_name: backend
    # platform: linux/amd64
    build:
      context: .
      dockerfile: dockerfiles/backend.dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - GIT_PYTHON_REFRESH=quiet
    image: backend:v1
    depends_on:
      prompt-init:
        condition: service_completed_successfully

  prompt-init:
    container_name: prompt-init
    build:
      context: .
      dockerfile: dockerfiles/backend.dockerfile
    image: backend:v1
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - GIT_PYTHON_REFRESH=quiet
    depends_on:
      mlflow:
        condition: service_healthy
    command: ["python", "-m", "rag.prompt_engineering.register_prompts"]
    restart: "no"

  mlflow:
    container_name: mlflow
    # platform: linux/amd64
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5001:5000"
    volumes:
      - mlflow_data:/mlflow # maps named volume mlflow_data into /mlflow folder
    command:
      [
        "mlflow",
        "server",
        "--host",
        "0.0.0.0",
        "--port",
        "5000",
        "--backend-store-uri",
        "sqlite:////mlflow/mlflow.db",
        "--allowed-hosts",
        "*",
      ]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  frontend:
    container_name: frontend
    # platform: linux/amd64
    build:
      context: .
      dockerfile: dockerfiles/frontend.dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8000
    image: frontend:v1

volumes:
  mlflow_data: